<!DOCTYPE html>
<html>
<head>
<title>Usuários - Wayne Industries</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.container{
    width:700px;
    margin:50px auto;
}

h1{
    color:gold;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    margin-bottom:30px;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

button{
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.cadastrar{
    background:gold;
    width:100%;
}

.voltar{
    background:#444;
    color:white;
    width:100%;
    margin-top:10px;
}

.excluir{
    background:red;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #333;
}

th{
    color:gold;
}

</style>

</head>

<body>

<div class="container">

<h1>Cadastro de Usuários</h1>

<div class="card">

<form action="/add_usuario" method="POST">

<input type="text" name="nome" placeholder="Nome" required>

<input type="text" name="cpf" placeholder="CPF" required>

<input type="text" name="cargo" placeholder="Cargo" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="senha" placeholder="Senha" required>
<select name="tipo">
<option value="funcionario">Funcionário</option>
<option value="gerente">Gerente</option>
<option value="admin">Administrador</option>
</select>

<button class="cadastrar">Cadastrar Usuário</button>

</form>

</div>


<table>

<tr>
<th>ID</th>
<th>Nome</th>
<th>CPF</th>
<th>Cargo</th>
<th>Email</th>
<th>Tipo</th>
<th>Ações</th>
</tr>

{% for u in usuarios %}

<tr>

<td>{{ u["id"] }}</td>
<td>{{ u["nome"] }}</td>
<td>{{ u["cpf"] }}</td>
<td>{{ u["cargo"] }}</td>
<td>{{ u["email"] }}</td>
<td>{{ u["tipo"] }}</td>

<td>

<a href="/delete_usuario/{{u.id}}">
<button class="excluir">Excluir</button>
</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">
<button class="voltar">⬅ Voltar ao Menu Principal</button>
</a>

</div>

</body>
</html>
