
<!DOCTYPE html>
<html>

<head>
<title>Wayne Industries Security</title>

<style>

body{
    background-color:#0f0f0f;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:#1e1e1e;
    padding:40px;
    border-radius:10px;
    text-align:center;
    width:320px;
    box-shadow:0 0 15px black;
}

.logo{
    font-size:80px;
    color:gold;
    font-weight:bold;
}

.title{
    color:gold;
    font-size:24px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    background:#ccc;
}

button{
    width:100%;
    padding:10px;
    background:gold;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#e6c200;
}

.cadastro{
    margin-top:10px;
}

.footer{
    margin-top:20px;
    color:#888;
    font-size:12px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">W</div>

<div class="title">Wayne Industries</div>

<form action="/auth" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="senha" placeholder="Senha" required>

<button type="submit">Login</button>

</form>

<div class="cadastro">

<a href="/cadastro">
<button>Cadastrar-se</button>
</a>

</div>

<div class="footer">
© 2026 Wayne Industries 🦇
</div>

</div>

</body>

</html>
